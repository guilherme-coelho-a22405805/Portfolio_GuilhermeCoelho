 {% extends "escola/base.html" %}
    
{% block content %}
<h2>Alunos</h2>

<section>
    {% for aluno in alunos %}
    <article>
        <header>
            <h3>{{ aluno.nome }}</h3>
            
        </header>

        <section>
            <h4>Cursos</h4>
            <ul>
                {% for curso in aluno.cursos.all %} <!--Para se saber esta 2ªparte ir aos related names do model.py-->
                    <li>{{ curso.nome }}</li>
                {% empty %}
                    <li>Sem cursos inscritos</li>
                {% endfor %}
            </ul>
        </section>
    </article>
    {% endfor %}
</section>
{% endblock %}
