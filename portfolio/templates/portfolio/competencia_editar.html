{% extends "portfolio/index.html" %}

{% block content %}
    <h2>Editar Competência: {{ competencia.nome }}</h2>

    <div class="form-container">
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn-add">Guardar Alterações</button>
            <a href="{% url 'competencias' %}" class="btn-cancel">Cancelar</a>
        </form>
    </div>
{% endblock %}
