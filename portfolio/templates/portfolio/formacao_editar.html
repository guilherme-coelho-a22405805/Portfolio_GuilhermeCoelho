{% extends "portfolio/index.html" %}

{% block content %}
    <h2>Editar Formação: {{ formacao.nome }}</h2>

    <div class="form-container">
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn-add">Guardar Alterações</button>
            <a href="{% url 'formacoes' %}" class="btn-cancel">Cancelar</a>
        </form>
    </div>
{% endblock %}
