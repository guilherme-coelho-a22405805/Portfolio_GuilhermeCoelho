{% extends "portfolio/index.html" %}

{% block content %}

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}

            <a href="{% url 'competencias' %}" class="btn-cancel">Cancelar</a>
        </div>
    </form>
{% endblock %}
